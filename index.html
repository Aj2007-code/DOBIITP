<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student DOB Search</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#020617;
--bg2:#0f172a;
--glass:rgba(255,255,255,0.08);
--border:rgba(255,255,255,0.18);
--text:#f1f5f9;
--muted:#94a3b8;
--accent:#22d3ee;
--yellow:#facc15;
}

*{
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
margin:0;
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,var(--bg),var(--bg2));
color:var(--text);
padding:15px;
}

.container{
width:100%;
max-width:900px;
padding:20px;
border-radius:18px;
background:var(--glass);
backdrop-filter:blur(18px);
border:1px solid var(--border);
}

h1{
text-align:center;
font-size:22px;
margin-bottom:15px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.12);
color:white;
font-size:15px;
outline:none;
}

input::placeholder{
color:var(--muted);
}

.suggestions{
background:#020617;
border-radius:8px;
margin-top:5px;
max-height:150px;
overflow-y:auto;
}

.suggestions div{
padding:10px;
cursor:pointer;
font-size:14px;
}

.suggestions div:hover{
background:rgba(255,255,255,0.1);
}

.suggestions .no-result{
color:var(--muted);
cursor:default;
font-size:13px;
}

.suggestions .no-result:hover{
background:transparent;
}

.card{
margin-top:12px;
padding:12px;
border-radius:10px;
background:rgba(255,255,255,0.1);
font-size:14px;
}

#birthday{
margin-top:15px;
padding:12px;
border-radius:10px;
background:rgba(250,204,21,0.2);
font-size:14px;
}

@media(max-width:600px){
h1{font-size:18px;}
input{font-size:14px;padding:12px;}
.card{font-size:13px;}
}

footer{
margin-top:20px;
font-size:13px;
color:var(--muted);
text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>IITP Birthday Finder</h1>

<input type="text" id="search" placeholder="Search name or roll no" onkeyup="handleInput()">
<div id="suggestions" class="suggestions"></div>

<div id="result"></div>
<div id="birthday"></div>

</div>

// ─── FIX: Use local date (not UTC) so IST users get the correct calendar day ───
function getTodayLocalMMDD() {
  const now = new Date();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  return mm + '-' + dd;
}

function handleInput() {
  const val = document.getElementById('search').value.toLowerCase().trim();
  const sug = document.getElementById('suggestions');
  sug.innerHTML = '';
  document.getElementById('result').innerHTML = '';

  if (!val) return;

  const filtered = data.filter(s =>
    s.Name.toLowerCase().includes(val) ||
    s['Emp No'].toLowerCase().includes(val)
  );

  if (filtered.length === 0) {
    const div = document.createElement('div');
    div.className = 'no-result';
    div.innerText = 'No student found.';
    sug.appendChild(div);
    return;
  }

  filtered.slice(0, 5).forEach(s => {
    const div = document.createElement('div');
    div.innerText = s.Name + ' (' + s['Emp No'] + ')';
    div.onclick = () => selectStudent(s);
    sug.appendChild(div);
  });
}

function selectStudent(s) {
  document.getElementById('search').value = s.Name;
  document.getElementById('suggestions').innerHTML = '';

  // Format DOB nicely: YYYY-MM-DD → DD Month YYYY
  const [year, month, day] = s.DOB.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const formattedDOB = parseInt(day) + ' ' + months[parseInt(month) - 1] + ' ' + year;

  const res = document.getElementById('result');
  res.innerHTML = '';
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = '<b>' + s.Name + '</b><br>' + s['Emp No'] + '<br>🎂 ' + formattedDOB;
  res.appendChild(div);
}

function checkBirthday() {
  // Use local date (MM-DD) — fixes the UTC-vs-IST bug
  const today = getTodayLocalMMDD();
  const bday = data.filter(s => s.DOB.slice(5, 10).replace('-', '-') === today.replace('-', '-'));

  const bdayEl = document.getElementById('birthday');
  if (bday.length) {
    bdayEl.style.display = 'block';
    bdayEl.innerHTML = '<b>Today\'s Birthdays</b><br>' + bday.map(x => x.Name + ' (' + x['Emp No'] + ')').join('<br>');
  } else {
    bdayEl.style.display = 'none';
  }
}

checkBirthday();
